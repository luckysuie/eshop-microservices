name: frontend-deployment
on:
  ## Trigger 1: Trigger the workflow when user, product , order, and payment services are successfully deployed to the AKS cluster
  workflow_run:
    workflows: ["user-service-deployment", "product-service-deployment", "order-service-deployment", "payment-service-deployment"]
    types:
      - completed
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'k8s/frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

env:
  ACR_NAME: eshopacr7894
  ACR_LOGIN_SERVER: eshopacr7894.azurecr.io
  IMAGE_NAME: frontend-service
  AKS_CLUSTER_NAME: eshop-aks7894
  AKS_RESOURCE_GROUP: eshop-rg

jobs:
  build-and-deploy:
    if: |
      github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push frontend image to ACR
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Deploy frontend to AKS
        run: |
          kubectl apply -f k8s/frontend/deployment.yaml
          kubectl apply -f k8s/frontend/service.yaml
          kubectl get svc --all-namespaces