name: user-service-deployment
on:
  push:
    branches:
      - main
    paths:
      - '.backend/user-service/**'
      - 'k8s/user-service/**'
      - '.github/workflows/user-service.yml'
  workflow_dispatch:

env:
    ACR_NAME: eshopacr7894
    ACR_LOGIN_SERVER: eshopacr7894.azurecr.io
    IMAGE_NAME: user-service
    AKS_CLUSTER_NAME: eshop-aks7894
    AKS_RESOURCE_GROUP: eshop-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push user-service image to ACR
        uses: docker/build-push-action@v6
        with:
          context: ./user-service
          file: ./user-service/Dockerfile
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Deploy user-service to AKS
        run: |
          kubectl apply -f k8s/user-service/deployment.yaml
          kubectl apply -f k8s/user-service/service.yaml
          kubectl get svc --all-namespaces