# =============================================
# Order Service Configuration
# =============================================

server.port=8083

# -----------------------------------------------
#  ★  YOUR ONLY CHANGE  ★
#  Replace YOUR_KEYVAULT_NAME with your Azure
#  Key Vault name (the short name, not the URL).
#
#  Example: if your Key Vault is "shopease-kv"
#  change it to:
#    https://shopease-kv.vault.azure.net/
#
#  Tip: use Ctrl+Shift+H in VS Code to replace
#  YOUR_KEYVAULT_NAME across the whole project.
# -----------------------------------------------
spring.cloud.azure.keyvault.secret.property-sources[0].endpoint=https://eshop-kv7894.vault.azure.net/

# ----- Database (Azure SQL) -----
spring.datasource.url=${db-url}
spring.datasource.username=${db-username}
spring.datasource.password=${db-password}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

spring.application.name=order-service

# ----- Health checks -----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
